name: DOCS

on:
  push:
    branches: ["main"]
    paths:
      - '**.md'
      - 'documents/**'
      - 'media/**'
      - 'design/**'
      - 'info.yaml'
      - 'config.yaml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "docs"
  cancel-in-progress: true

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-science

    uses: analogicus/jnw-actions/.github/workflows/docs.yaml@main
    permissions:
      contents: read
      pages: write
      id-token: write
